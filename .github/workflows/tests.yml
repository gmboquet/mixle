name: Tests

on:
  # Pushes to main run CI; pushes to PR branches are covered by the pull_request event,
  # so feature branches don't trigger two identical runs.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

# Cancel superseded runs (e.g. rapid pushes to the same PR / branch) instead of piling them up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff enforced, mypy advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"
      # ruff is enforced: the tree is formatted and lint-clean under the rules in pyproject.toml.
      - name: ruff format --check
        run: ruff format --check mixle
      - name: ruff check
        run: ruff check mixle
      # mypy stays advisory until the type-checking backlog is addressed (config in pyproject.toml).
      - name: mypy
        continue-on-error: true
        run: mypy

  fast:
    name: fast / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run fast tests
        run: python -m pytest -m fast -n auto

  min-versions:
    name: min-versions (oldest declared floors)
    # Install at the OLDEST declared dependency floors (constraints-min.txt) on the oldest supported
    # Python and run the fast suite, so a floor that is missing an API, unbuildable, or numerically
    # incompatible fails here instead of silently passing on whatever newer version pip resolves.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package at the declared minimum dependency versions
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-min.txt -e ".[test]"
          python -c "import numpy, scipy, mpmath; print('numpy', numpy.__version__, 'scipy', scipy.__version__, 'mpmath', mpmath.__version__)"
      - name: Run fast tests at the minimum floors
        run: python -m pytest -m fast -n auto

  full:
    name: full / py3.12
    # Runs in parallel with `fast` (no `needs:`) to cut wall-clock; -n auto parallelizes within.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run full non-optional suite with coverage
        # Reporting only for now, no --cov-fail-under gate: this base install skips every optional
        # backend (torch/numba/spark/dask/jax/...), so line coverage here is a floor, not the real
        # number -- a hard threshold set against this subset would misrepresent actual coverage and
        # either block unrelated PRs or get raised past what full-extras coverage really supports.
        # Revisit once the optional-extras job also reports and the two are combined.
        run: python -m pytest -m "not optional and not benchmark" -n auto --cov --cov-report=xml --cov-report=term
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

  clean-wheel:
    name: clean-wheel install + import sweep
    # A base install of the BUILT WHEEL (not an editable checkout, no optional extras) must import every
    # public module. An optional dependency imported at a module's top level breaks `import mixle...` for
    # every base-install user -- a regression that shipped in the wheel before (numba, mpi4py).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist
      - name: Install the wheel into a clean base env (no extras, not editable)
        run: |
          python -m venv "$RUNNER_TEMP/cleanvenv"
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip check
      - name: Import smoke + full public-module sweep from the clean wheel
        # Run as a script (its dir, not the repo root, is on sys.path) so the source tree cannot shadow
        # the installed package; the script asserts it is importing the site-packages wheel.
        run: '"$RUNNER_TEMP/cleanvenv/bin/python" scripts/import_sweep.py'

  optional:
    name: optional extras / py3.12
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install optional test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,numba,torch,umap,jax]"
      - name: Run optional tests
        run: python -m pytest -m "optional or torch or numba or jax" -n auto
      - name: Run gated two-rank torchrun smoke
        # -m "" overrides the default `-m fast` addopts; the torchrun tests aren't `fast`, so without this
        # the selection is empty and pytest exits 5 ("no tests collected"), failing the job.
        run: MIXLE_RUN_TORCHRUN_SMOKE=1 python -m pytest mixle/tests/torchrun_encoded_data_test.py mixle/tests/torch_neural_test.py -q -m ""
      - name: Install the Banking77 flagship dataset dependency
        run: python -m pip install datasets
      - name: Run the Banking77 real-data flagship smoke
        # The one flagship on real public data (F10.4): bounded run of the teacher/student cascade. It
        # skips itself if the dataset can't be fetched (offline), so a network blip is a skip, not a fail.
        run: python -m pytest mixle/tests/real_receipt_banking77_smoke_test.py -q -m ""
