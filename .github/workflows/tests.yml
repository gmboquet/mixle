name: Tests

on:
  # Pushes to main run CI; pushes to PR branches are covered by the pull_request event,
  # so feature branches don't trigger two identical runs.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

# Cancel superseded runs (e.g. rapid pushes to the same PR / branch) instead of piling them up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff enforced, mypy advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"
      # ruff is enforced: the tree is formatted and lint-clean under the rules in pyproject.toml.
      - name: ruff format --check
        run: ruff format --check mixle
      - name: ruff check
        run: ruff check mixle
      # Y4.4 architecture contracts ([tool.importlinter] in pyproject.toml): experimental is never a
      # dependency of the stable core; distribution kernels / engines carry no direct orchestration
      # imports. Static graph analysis (grimp) -- imports nothing, so no optional extras needed here.
      - name: lint-imports (architecture contracts)
        run: lint-imports
      # A curated typed-core is checked strictly and BLOCKING (worklist Y4.1): these modules are fully
      # annotated and clean under disallow_untyped_defs (see the [[tool.mypy.overrides]] typed-core list in
      # pyproject.toml). --follow-imports=skip keeps the check to these modules' own annotations so a
      # dependency's or an untyped sibling's errors cannot leak in. The list grows as more modules qualify.
      - name: mypy (typed core, blocking)
        run: mypy --follow-imports=skip mixle/scorecard.py mixle/spend.py mixle/system.py mixle/registry.py
      # The whole-tree mypy stays advisory until the rest of the type-checking backlog is addressed.
      - name: mypy (whole tree, advisory)
        continue-on-error: true
        run: mypy

  fast:
    name: fast / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      # `highprec` (mpmath) is installed alongside `test` here so vmf_test.py / kent_test.py /
      # lkj_test.py / bingham_test.py's exact-normalizer checks keep actually running (not skipping) now
      # that mpmath is an optional extra rather than a base dependency (worklist P2.2).
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,highprec]"
      - name: Run fast tests
        run: python -m pytest -m fast -n auto

  fast-macos:
    name: fast / macOS arm64 / py${{ matrix.python-version }}
    # macOS arm64 is the day-to-day dev platform; this gates it in CI so the "Operating System :: MacOS"
    # classifier and the README's macOS claim are backed by a run, not just ad-hoc local use.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,highprec]"
      - name: Run fast tests
        run: python -m pytest -m fast -n auto

  min-versions:
    name: min-versions (oldest declared floors)
    # Install at the OLDEST declared dependency floors (constraints-min.txt) on the oldest supported
    # Python and run the fast suite, so a floor that is missing an API, unbuildable, or numerically
    # incompatible fails here instead of silently passing on whatever newer version pip resolves.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package at the declared minimum dependency versions
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-min.txt -e ".[test,highprec]"
          python -c "import numpy, scipy, mpmath; print('numpy', numpy.__version__, 'scipy', scipy.__version__, 'mpmath', mpmath.__version__)"
      - name: Run fast tests at the minimum floors
        run: python -m pytest -m fast -n auto

  full:
    name: full / py3.12
    # Runs in parallel with `fast` (no `needs:`) to cut wall-clock; -n auto parallelizes within.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,highprec]"
      - name: Run full non-optional suite with coverage
        # --cov-fail-under=45 is a deliberately conservative CATASTROPHIC-REGRESSION floor, not a coverage
        # target. This base install skips every optional backend (torch/numba/spark/dask/jax/...), so line
        # coverage here is a floor of the real number (locally, with the backends installed, the fast suite
        # alone covers ~72%); a threshold set near the true number would misrepresent it and block unrelated
        # PRs. 45% trips only when a whole subsystem's tests vanish -- e.g. a bad merge dropping a test
        # directory -- which is exactly the regression a gate must catch. Raise it once the optional-extras
        # job also reports coverage and the two are combined into a representative number.
        run: python -m pytest -m "not optional and not benchmark" -n auto --cov --cov-report=xml --cov-report=term --cov-fail-under=45
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

  clean-wheel:
    name: clean-wheel install + import sweep
    # A base install of the BUILT WHEEL (not an editable checkout, no optional extras) must import every
    # public module. An optional dependency imported at a module's top level breaks `import mixle...` for
    # every base-install user -- a regression that shipped in the wheel before (numba, mpi4py).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist
      - name: Install the wheel into a clean base env (no extras, not editable)
        run: |
          python -m venv "$RUNNER_TEMP/cleanvenv"
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/cleanvenv/bin/python" -m pip check
      - name: Import smoke + full public-module sweep from the clean wheel
        # Run as a script (its dir, not the repo root, is on sys.path) so the source tree cannot shadow
        # the installed package; the script asserts it is importing the site-packages wheel.
        run: '"$RUNNER_TEMP/cleanvenv/bin/python" scripts/import_sweep.py'

  optional:
    name: optional extras / py3.12
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install optional test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,numba,torch,umap,jax]"
      - name: Run optional tests
        run: python -m pytest -m "optional or torch or numba or jax" -n auto
      - name: Run gated two-rank torchrun smoke
        # -m "" overrides the default `-m fast` addopts; the torchrun tests aren't `fast`, so without this
        # the selection is empty and pytest exits 5 ("no tests collected"), failing the job.
        run: MIXLE_RUN_TORCHRUN_SMOKE=1 python -m pytest mixle/tests/torchrun_encoded_data_test.py mixle/tests/torch_neural_test.py -q -m ""
      - name: Run scikit-learn GMM fitted-parameter parity (Q5.5)
        # scikit-learn is an external reference (not a mixle runtime dependency); the test importorskips
        # it, so this step is the one place it is installed and actually exercised as a gate.
        run: |
          python -m pip install scikit-learn
          python -m pytest mixle/tests/sklearn_gmm_parity_test.py -q -m ""
      - name: Run the temporal real-data flagship smoke (sunspots HMM vs hmmlearn, F10.2)
        # Real sunspot series -> discrete HMM, held-out LL validated against hmmlearn; skips itself if the
        # series can't be fetched (offline), so a network blip is a skip, not a fail.
        run: |
          python -m pip install hmmlearn
          python -m pytest mixle/tests/flagship_temporal_sunspots_smoke_test.py -q -m ""
      - name: Run the heterogeneous real-data flagship smoke (Adult, F10.1)
        # Bounded fit of a heterogeneous model on real UCI Adult records; skips itself if the dataset
        # can't be fetched (offline), so a network blip is a skip, not a fail.
        run: |
          python -m pip install datasets
          python -m pytest mixle/tests/flagship_heterogeneous_adult_smoke_test.py -q -m ""
      - name: Exercise the dask distributed backend (worklist D8.3)
        # The dask encoded-data backend has tests that SKIP everywhere else because dask is not installed.
        # Install it and run them, so at least one distributed backend is genuinely exercised in CI (E2),
        # not just documented. dask is pip-only (no Java/cluster), so it is the cheapest to gate here.
        run: |
          python -m pip install "dask>=2023.5.0" "distributed>=2023.5.0"
          python -m pytest mixle/tests/dask_encoded_data_test.py -q -m ""
      - name: Install the Banking77 flagship dataset dependency
        run: python -m pip install datasets
      - name: Run the Banking77 real-data flagship smoke
        # The one flagship on real public data (F10.4): bounded run of the teacher/student cascade. It
        # skips itself if the dataset can't be fetched (offline), so a network blip is a skip, not a fail.
        run: python -m pytest mixle/tests/real_receipt_banking77_smoke_test.py -q -m ""
