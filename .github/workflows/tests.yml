name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  lint:
    name: lint (ruff enforced, mypy advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"
      # ruff is enforced: the tree is formatted and lint-clean under the rules in pyproject.toml.
      - name: ruff format --check
        run: ruff format --check pysp
      - name: ruff check
        run: ruff check pysp
      # mypy stays advisory until the type-checking backlog is addressed (config in pyproject.toml).
      - name: mypy
        continue-on-error: true
        run: mypy

  fast:
    name: fast / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run fast tests
        run: python -m pytest -m fast

  full:
    name: full / py3.12
    runs-on: ubuntu-latest
    needs: fast
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run full non-optional suite
        run: python -m pytest -m "not optional and not benchmark"

  optional:
    name: optional extras / py3.12
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install optional test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,numba,torch,umap]"
      - name: Run optional tests
        run: python -m pytest -m "optional or torch or numba"
      - name: Run gated two-rank torchrun smoke
        run: PYSPARKPLUG_RUN_TORCHRUN_SMOKE=1 python -m pytest pysp/tests/torchrun_encoded_data_test.py -q
