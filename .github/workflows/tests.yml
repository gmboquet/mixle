name: Tests

on:
  # Pushes to main run CI; pushes to PR branches are covered by the pull_request event,
  # so feature branches don't trigger two identical runs.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

# Cancel superseded runs (e.g. rapid pushes to the same PR / branch) instead of piling them up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff enforced, mypy advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint]"
      # ruff is enforced: the tree is formatted and lint-clean under the rules in pyproject.toml.
      - name: ruff format --check
        run: ruff format --check pysp
      - name: ruff check
        run: ruff check pysp
      # mypy stays advisory until the type-checking backlog is addressed (config in pyproject.toml).
      - name: mypy
        continue-on-error: true
        run: mypy

  fast:
    name: fast / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run fast tests
        run: python -m pytest -m fast -n auto

  full:
    name: full / py3.12
    # Runs in parallel with `fast` (no `needs:`) to cut wall-clock; -n auto parallelizes within.
    runs-on: ubuntu-latest
    env:
      # numba's @njit(cache=True) kernels write here; caching the dir across runs gives a WARM cache so
      # the HMM/sampling tests skip cold JIT compilation (the dominant cost on CI's fresh runners).
      NUMBA_CACHE_DIR: ${{ github.workspace }}/.numba_cache
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Cache numba JIT compilation
        # Rolling cache: the per-sha key never hits exactly (so a fresh warm cache is saved every run),
        # and restore-keys loads the most recent prior one. numba re-JITs only functions whose source
        # changed (it keys its own files by source hash), so the cache stays correct across commits.
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.numba_cache
          key: numba-${{ runner.os }}-py312-${{ github.sha }}
          restore-keys: |
            numba-${{ runner.os }}-py312-
      - name: Install package and test harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,numba]"
      - name: Run full non-optional suite
        # numba runs the HMM/sampling tests' default (fast) path; the fast / py3.* jobs keep .[test]
        # (no numba) so the pure-numpy path is still covered.
        run: python -m pytest -m "not optional and not benchmark" -n auto

  optional:
    name: optional extras / py3.12
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install optional test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,numba,torch,umap]"
      - name: Run optional tests
        run: python -m pytest -m "optional or torch or numba" -n auto
      - name: Run gated two-rank torchrun smoke
        run: PYSPARKPLUG_RUN_TORCHRUN_SMOKE=1 python -m pytest pysp/tests/torchrun_encoded_data_test.py -q
