name: Security

# Scan the resolved dependency set for known vulnerabilities. The gate runs weekly, on every active
# release-tip update, on main, on dependency-changing pull requests, and by manual dispatch. Findings
# are blocking unless their identifier, rationale, and review date are explicitly recorded in the
# audited waiver file.

on:
  push:
    branches: [main, release/0.8.0]
  pull_request:
    paths:
      - "pyproject.toml"
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (base install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package (base extras only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit
      - name: Audit resolved dependencies
        # Blocking: a known vulnerability in a base dependency fails CI. To accept a specific finding
        # temporarily, add its ID (with a reason + review date) to .github/pip-audit-ignore.txt; only
        # IDs listed there are waived.
        run: |
          IGNORES=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' .github/pip-audit-ignore.txt | awk '{printf " --ignore-vuln %s", $1}')
          echo "waived vulns:${IGNORES:- (none)}"
          pip-audit $IGNORES
