name: Docs

# Build versioned Sphinx documentation (every v* tag with a docs/ tree, plus main) and deploy it to
# GitHub Pages. Runs on pushes to main that touch the docs or the documented package, and on manual
# dispatch. The site source stays as .rst under docs/; the built HTML is never committed
# (docs/_build/ is gitignored) -- it is produced here and served from Pages.
#
# sphinx-polyversion (docs/poly.py) drives the multi-version build: it discovers matching tags/
# branches via git, checks each into an isolated temporary venv, and builds its own docs/ tree into
# docs/_build/html/<name>/. This needs the full git history (all tags/branches), not the single-commit
# shallow clone actions/checkout does by default.
#
# One-time setup (repo Settings > Pages): set the source to "GitHub Actions". This workflow already has the
# permissions the deploy step needs.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mixle/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token plus the OIDC + pages permissions the deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build versioned HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history: sphinx-polyversion needs every matched tag/branch, not just HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install sphinx-polyversion
        # The driver itself builds each matched revision (tags + main) into its own isolated venv
        # (see docs/poly.py), installing that revision's own mixle[docs] + CPU torch there, so the
        # top-level job env doesn't need them. It does need jinja2 directly, though: root-level
        # artifacts (docs/_root_templates/*) are rendered by build_root() in this top-level process,
        # not inside a per-revision venv, and sphinx-polyversion doesn't declare jinja2 as a hard
        # dependency (only needed when template_dir/static_dir are set, as ours are).
        run: |
          python -m pip install --upgrade pip
          pip install sphinx-polyversion jinja2
      - name: Build all versions
        run: |
          sphinx-polyversion docs/poly.py
          touch docs/_build/html/.nojekyll   # serve _static/ etc. verbatim (no Jekyll processing)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
