name: Docs

# Build the Sphinx documentation and deploy it to GitHub Pages. Runs on pushes to main that touch the
# docs or the documented package, and on manual dispatch. The site source stays as .rst under docs/; the
# built HTML is never committed (docs/_build/ is gitignored) -- it is produced here and served from Pages.
#
# One-time setup (repo Settings > Pages): set the source to "GitHub Actions". This workflow already has the
# permissions the deploy step needs.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mixle/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token plus the OIDC + pages permissions the deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (base mixle + CPU torch + Sphinx)
        # autodoc imports the package; the heavy back-ends (spark/dask/mpi/pandas/…) are mocked in
        # docs/conf.py, so only base mixle plus CPU-only torch (the one un-mocked import) is installed.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"
      - name: Build
        run: |
          sphinx-build -b html docs docs/_build/html
          touch docs/_build/html/.nojekyll   # serve _static/ etc. verbatim (no Jekyll processing)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
