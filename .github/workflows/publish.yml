name: Publish

# Build the sdist + wheel and publish to PyPI via Trusted Publishing (OIDC) -- no API tokens are
# stored as secrets. Publishing to PyPI runs only when a GitHub Release is published; a manual
# workflow_dispatch can build-and-check without touching PyPI.
#
# The PyPI distribution name is "mixle" (the import package is still `mixle`); the GitHub repo
# is gmboquet/mixle.
# One-time setup (PyPI side, done by the maintainer):
#   1. Confirm the project name "mixle" is available or owned by you (https://pypi.org/project/mixle/).
#   2. On PyPI, add a Trusted Publisher for the "mixle" project (a "pending" publisher if it
#      does not exist yet):
#        Owner: gmboquet   Repository: mixle
#        Workflow: publish.yml   Environment: pypi
# To release: bump `version` in pyproject.toml, tag the commit (e.g. v0.2.0), and publish a GitHub
# Release for that tag -- this workflow then builds and uploads it.

on:
  release:
    types: [published]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      # Validate metadata renders on PyPI before any upload.
      - name: Twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    # Real publish only on a published GitHub Release.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
